<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">店舗サイトテンプレート</title>
<meta name="description" id="pageDesc" content="">
<style>
  :root {
    /* テーマ変数はCONFIGから流し込まれます */
    --primary: #7a5c3e;
    --primary-dark: #5d452e;
    --accent: #c9a227;
    --bg: #faf7f2;
    --ink: #2b2620;
    --sub: #6f675c;
    --card: #ffffff;
    --hero-grad-1: #8a6a48;
    --hero-grad-2: #4a3826;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; scroll-padding-top: 72px; }
  body {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "BIZ UDMincho", serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.9;
    letter-spacing: .04em;
  }
  body.font-sans {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }

  /* ===== ヘッダー ===== */
  header.site {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 64px;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(0,0,0,.06);
  }
  .brand { font-size: 18px; font-weight: 700; letter-spacing: .1em; color: var(--primary-dark); }
  nav.gnav { display: flex; gap: 26px; font-size: 14px; }
  nav.gnav a { position: relative; padding: 4px 0; }
  nav.gnav a::after {
    content: ""; position: absolute; left: 0; bottom: 0;
    width: 0; height: 1.5px; background: var(--accent);
    transition: width .25s;
  }
  nav.gnav a:hover::after { width: 100%; }
  .tel-btn {
    background: var(--primary);
    color: #fff !important;
    border-radius: 999px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 700;
  }
  .tel-btn:hover { background: var(--primary-dark); }
  @media (max-width: 760px) { nav.gnav { display: none; } }

  /* ===== ヒーロー ===== */
  .hero {
    position: relative;
    min-height: 88vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
    background:
      radial-gradient(1100px 500px at 85% -10%, rgba(255,255,255,.16), transparent 60%),
      radial-gradient(800px 600px at 10% 110%, rgba(255,255,255,.10), transparent 55%),
      linear-gradient(135deg, var(--hero-grad-1), var(--hero-grad-2));
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute; inset: 0;
    background-image: var(--hero-photo, none);
    background-size: cover;
    background-position: center;
    opacity: .55;
  }
  .hero-inner { position: relative; padding: 96px 20px 60px; max-width: 760px; }
  .hero .en {
    font-size: clamp(13px, 2vw, 16px);
    letter-spacing: .5em;
    text-transform: uppercase;
    opacity: .85;
    margin-bottom: 14px;
  }
  .hero h1 {
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 700;
    letter-spacing: .12em;
    text-shadow: 0 2px 24px rgba(0,0,0,.35);
  }
  .hero .tagline {
    margin-top: 18px;
    font-size: clamp(15px, 2.4vw, 19px);
    opacity: .95;
    text-shadow: 0 1px 12px rgba(0,0,0,.35);
  }
  .hero-ctas { margin-top: 36px; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-block;
    border-radius: 999px;
    padding: 13px 34px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .08em;
    transition: transform .15s, opacity .15s;
  }
  .btn:hover { transform: translateY(-2px); opacity: .92; }
  .btn.gold { background: var(--accent); color: #fff; }
  .btn.ghost { border: 1.5px solid rgba(255,255,255,.85); color: #fff; }

  /* ===== セクション共通 ===== */
  section.block { padding: 84px 20px; }
  section.block:nth-of-type(even) { background: #fff; }
  .container { max-width: 1000px; margin: 0 auto; }
  .sec-head { text-align: center; margin-bottom: 48px; }
  .sec-head .en {
    font-size: 13px;
    letter-spacing: .4em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .sec-head h2 {
    font-size: clamp(24px, 4vw, 32px);
    letter-spacing: .14em;
    margin-top: 6px;
    color: var(--primary-dark);
  }
  .sec-head h2::after {
    content: "";
    display: block;
    width: 44px; height: 2px;
    background: var(--accent);
    margin: 16px auto 0;
  }

  /* ===== こだわり ===== */
  .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  @media (max-width: 760px) { .features { grid-template-columns: 1fr; } }
  .feature {
    background: var(--card);
    border: 1px solid rgba(0,0,0,.06);
    border-radius: 14px;
    padding: 34px 26px;
    text-align: center;
    box-shadow: 0 6px 24px rgba(40,30,10,.05);
  }
  .feature .icon { font-size: 40px; margin-bottom: 14px; }
  .feature h3 { font-size: 18px; letter-spacing: .1em; color: var(--primary-dark); margin-bottom: 10px; }
  .feature p { font-size: 14px; color: var(--sub); text-align: left; }

  /* ===== メニュー ===== */
  .menu-group { margin-bottom: 36px; }
  .menu-group h3 {
    font-size: 18px;
    letter-spacing: .12em;
    color: var(--primary-dark);
    border-left: 4px solid var(--accent);
    padding-left: 12px;
    margin-bottom: 18px;
  }
  .menu-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 10px 4px;
    border-bottom: 1px dashed rgba(0,0,0,.15);
    font-size: 15px;
  }
  .menu-item .m-name { flex-shrink: 0; }
  .menu-item .m-note { font-size: 12.5px; color: var(--sub); }
  .menu-item .m-dots { flex: 1; }
  .menu-item .m-price { flex-shrink: 0; font-weight: 700; color: var(--primary-dark); }

  /* ===== お知らせ ===== */
  .news-list { max-width: 760px; margin: 0 auto; }
  .news-item {
    display: flex;
    gap: 22px;
    padding: 16px 6px;
    border-bottom: 1px solid rgba(0,0,0,.08);
    font-size: 15px;
    align-items: baseline;
  }
  .news-item time { color: var(--accent); font-weight: 700; flex-shrink: 0; font-size: 14px; }
  @media (max-width: 560px) { .news-item { flex-direction: column; gap: 2px; } }

  /* ===== 店舗情報 ===== */
  .info-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; }
  @media (max-width: 760px) { .info-wrap { grid-template-columns: 1fr; } }
  table.shop-info { width: 100%; border-collapse: collapse; font-size: 15px; }
  table.shop-info th, table.shop-info td {
    text-align: left;
    padding: 13px 8px;
    border-bottom: 1px solid rgba(0,0,0,.1);
    vertical-align: top;
  }
  table.shop-info th { width: 96px; color: var(--primary-dark); font-weight: 700; white-space: nowrap; }
  .map-box {
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,.08);
    min-height: 300px;
    background: #e9e5de;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--sub);
    font-size: 14px;
  }
  .map-box iframe { width: 100%; height: 100%; min-height: 300px; border: 0; }

  /* ===== フッター ===== */
  footer.site {
    background: var(--primary-dark);
    color: rgba(255,255,255,.9);
    text-align: center;
    padding: 56px 20px 90px;
  }
  footer.site .f-name { font-size: 20px; letter-spacing: .18em; margin-bottom: 10px; }
  footer.site .f-addr { font-size: 13px; opacity: .8; }
  footer.site .copy { font-size: 11px; opacity: .55; margin-top: 26px; }

  /* ===== モバイル固定CTA ===== */
  .mobile-cta {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 100;
    display: none;
    grid-template-columns: 1fr 1fr;
  }
  .mobile-cta a {
    padding: 15px 0;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }
  .mobile-cta .call { background: var(--primary); }
  .mobile-cta .line { background: #06c755; }
  @media (max-width: 760px) { .mobile-cta { display: grid; } }

  .fade { opacity: 0; transform: translateY(18px); transition: opacity .7s, transform .7s; }
  .fade.show { opacity: 1; transform: none; }
</style>
</head>

  r.setProperty("--accent", c.theme.accent);
  r.setProperty("--bg", c.theme.bg);
  r.setProperty("--hero-grad-1", c.theme.heroGrad[0]);
  r.setProperty("--hero-grad-2", c.theme.heroGrad[1]);
  if (c.theme.font === "sans") document.body.classList.add("font-sans");
  if (c.heroPhoto) $("hero").style.setProperty("--hero-photo", c.heroPhoto);

  // タイトル・ヘッダー・ヒーロー
  document.title = c.name + "|" + c.tagline;
  $("pageDesc").setAttribute("content", c.name + " - " + c.tagline);
  $("brandName").textContent = c.name;
  $("heroEn").textContent = c.nameEn;
  $("heroName").textContent = c.name;
  $("heroTagline").textContent = c.tagline;
  $("navMenu").textContent = c.menuLabel;
  $("menuTitle").textContent = c.menuLabel;

  const cta = $("heroCta1");
  cta.textContent = c.heroCta.label;
  cta.href = c.heroCta.href === "LINE" ? c.lineUrl : c.heroCta.href;
  if (c.heroCta.href === "LINE") { cta.target = "_blank"; cta.rel = "noopener"; }

  // 電話・LINE
  $("headerTel").href = "tel:" + c.tel;
  $("mobileTel").href = "tel:" + c.tel;
  $("mobileLine").href = c.lineUrl;

  // こだわり
  $("featureCards").innerHTML = c.features.map(f =>
    '<div class="feature fade"><div class="icon">' + f.icon + '</div><h3>' + esc(f.title) + '</h3><p>' + esc(f.text) + '</p></div>'
  ).join("");

  // メニュー
  $("menuGroups").innerHTML = c.menu.map(g =>
    '<div class="menu-group fade"><h3>' + esc(g.group) + '</h3>' +
    g.items.map(i =>
      '<div class="menu-item"><span class="m-name">' + esc(i.name) + '</span>' +
      (i.note ? '<span class="m-note">' + esc(i.note) + '</span>' : '') +
      '<span class="m-dots"></span><span class="m-price">' + esc(i.price) + '</span></div>'
    ).join("") + '</div>'
  ).join("");
  $("menuNote").textContent = c.menuNote || "";

  // お知らせ
  $("newsList").innerHTML = c.news.map(n =>
    '<div class="news-item fade"><time>' + esc(n.date) + '</time><span>' + esc(n.text) + '</span></div>'
  ).join("");

  // 店舗情報
  $("infoTable").innerHTML = Object.entries(c.info).map(([k, v]) =>
    '<tr><th>' + esc(k) + '</th><td>' + esc(v) + '</td></tr>'
  ).join("");
  if (c.mapEmbed) $("mapBox").innerHTML = '<iframe src="' + c.mapEmbed + '" loading="lazy" allowfullscreen></iframe>';

  // フッター
  $("footName").textContent = c.name;
  $("footAddr").textContent = (c.info["住所"] || "") + (c.tel ? "  TEL " + c.info["電話"] : "");
  $("footCopy").textContent = "© " + new Date().getFullYear() + " " + c.nameEn + ". All rights reserved.";

  // スクロールフェードイン
  const io = new IntersectionObserver((es) => {
    es.forEach(e => { if (e.isIntersecting) { e.target.classList.add("show"); io.unobserve(e.target); } });
  }, { threshold: .12 });
  document.querySelectorAll(".fade").forEach(el => io.observe(el));
})(CONFIG);
</script>
</body>
</html>
